<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
    background: #0b0f17; color: #e6edf6; position: relative;
  }
  .glow {
    position: absolute; top: -200px; right: -150px; width: 700px; height: 700px;
    background: radial-gradient(closest-side, rgba(109,40,217,0.45), transparent 70%);
  }
  .wrap { position: relative; padding: 80px 90px; height: 100%; display: flex; flex-direction: column; justify-content: center; }
  .eyebrow { color: #9d7cf0; font-size: 26px; font-weight: 600; letter-spacing: 1px; margin-bottom: 14px; }
  h1 {
    font-size: 92px; font-weight: 800; letter-spacing: -2px; line-height: 1.02;
    background: linear-gradient(120deg, #6d28d9, #9d7cf0);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .role { font-size: 38px; font-weight: 700; margin-top: 18px; }
  .role .dot { color: #6d28d9; }
  .tags { margin-top: 34px; display: flex; gap: 12px; flex-wrap: wrap; }
  .tag { font-size: 22px; color: #cdd6e4; background: #18212f; border: 1px solid #243047; padding: 8px 18px; border-radius: 10px; }
  .foot { position: absolute; bottom: 56px; left: 90px; right: 90px; display: flex; justify-content: space-between; align-items: center; color: #93a1b5; font-size: 24px; }
  .foot .brand { color: #e6edf6; font-weight: 700; }
  .foot .brand span { color: #9d7cf0; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="wrap">
    <div class="eyebrow">SOFTWARE ENGINEER IN TEST</div>
    <h1>Argyrios<br/>Gerostergiou</h1>
    <div class="role">I make software reliable<span class="dot">.</span></div>
    <div class="tags">
      <span class="tag">C# · xUnit</span>
      <span class="tag">Playwright · TypeScript</span>
      <span class="tag">CI/CD</span>
      <span class="tag">Test Automation</span>
    </div>
  </div>
  <div class="foot">
    <span class="brand">Port<span>folio</span></span>
    <span>argirisgerost@gmail.com</span>
  </div>
</body>
</html>
